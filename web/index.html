<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Improving Methods · Training Norte</title>
    <style>
      /* Pantalla de carga inicial (visible mientras se sincronizan los datos).
         React reemplaza el contenido de #root al montar. */
      #root { min-height: 100vh; background: #0a0a0a; }
      .im-boot {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px; background: #0a0a0a;
      }
      .im-boot__spin {
        width: 42px; height: 42px; border-radius: 50%;
        border: 3px solid rgba(245, 195, 0, 0.2); border-top-color: #f5c300;
        animation: im-spin 0.8s linear infinite;
      }
      .im-boot__txt { color: #6b7280; font: 600 13px system-ui, -apple-system, sans-serif; letter-spacing: .02em; }
      @keyframes im-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="im-boot">
        <div class="im-boot__spin"></div>
        <p class="im-boot__txt">Cargando…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
